<svg width="88" height="28" viewBox="0 0 88 28" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GrantPilot">
  <title>GrantPilot</title>
  <g fill="#0066CC" shape-rendering="crispEdges">
    <!-- G — separated geometry, no overlapping fills with wings -->
    <rect x="36" y="0" width="12" height="4" />   <!-- top arc -->
    <rect x="32" y="4" width="4" height="20" />   <!-- left bar (single tall rect, rows 1-5) -->
    <rect x="48" y="4" width="4" height="4" />    <!-- right shoulder top -->
    <rect x="44" y="12" width="8" height="4" />   <!-- crossbar -->
    <rect x="48" y="16" width="4" height="8" />   <!-- right bar (rows 4-5 merged) -->
    <rect x="36" y="24" width="12" height="4" />  <!-- bottom arc -->
    <!-- Left wing — 3 feathers, no overlap with G left bar -->
    <rect x="0" y="8" width="32" height="4" />    <!-- top feather, cols 0-7 -->
    <rect x="4" y="12" width="28" height="4" />   <!-- middle, cols 1-7 -->
    <rect x="8" y="16" width="24" height="4" />   <!-- bottom, cols 2-7 -->
    <!-- Right wing — 3 feathers -->
    <rect x="56" y="8" width="32" height="4" />   <!-- top, cols 14-21 -->
    <rect x="56" y="12" width="28" height="4" />  <!-- middle, cols 14-20 -->
    <rect x="56" y="16" width="24" height="4" />  <!-- bottom, cols 14-19 -->
  </g>
</svg>
