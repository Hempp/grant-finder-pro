<svg width="48" height="32" viewBox="0 0 48 32" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GrantPilot">
  <title>GrantPilot</title>

  <!-- LEFT WING: three feathers, tapered from root to tip, swept slightly down -->
  <g fill="#0066CC">
    <path d="M16 11 L1 13.2 L1 13.9 L16 13 Z" />
    <path d="M16 14.5 L4 16.5 L4 17.2 L16 16.5 Z" />
    <path d="M16 18 L8 19.7 L8 20.4 L16 20 Z" />
  </g>

  <!-- RIGHT WING: mirror -->
  <g fill="#0066CC">
    <path d="M32 11 L47 13.2 L47 13.9 L32 13 Z" />
    <path d="M32 14.5 L44 16.5 L44 17.2 L32 16.5 Z" />
    <path d="M32 18 L40 19.7 L40 20.4 L32 20 Z" />
  </g>

  <!-- CENTRAL G: capital letterform, opening on the right, crossbar inward -->
  <path
    d="M 30 11.5 A 7.5 7.5 0 1 1 30 20.5 L 30 16 L 25 16"
    stroke="#0066CC"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
